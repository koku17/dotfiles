# Variables
$media_aspect = 0.75

# By default all apps float
windowrule = float on, match:class .*

# Tiling windows list
windowrule = tag +tiled, match:initial_title New tab - Chromium

# Tile only windows
windowrule = tile on, match:tag tiled

#xdg-popups
# windowrule = float on, match:class xdg-desktop-portal-gtk, match:initial_class xdg-desktop-portal-gtk
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class xdg-desktop-portal-gtk, match:initial_class xdg-desktop-portal-gtk

# tile terminals
windowrule = tile on, match:class Alacritty
windowrule = tile on, match:class com.mitchellh.ghostty

# swayimg
# windowrule = float on, match:class swayimg(.*)
windowrule = size (0.75*monitor_h*window_w/window_h) (monitor_h*0.75), match:class swayimg
windowrule = opaque on, match:class swayimg

# Kega fusion
# windowrule = float on, match:initial_class Fusion
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:title Export Image as (.*), match:initial_title Export Image as (.*)

# network manager
# windowrule = float on, match:class nm-connection-editor
windowrule = size (monitor_w*0.5) (monitor_h*0.6), match:class nm-connection-editor

# blueman
# windowrule = float on, match:class blueman-manager, match:title Bluetooth Devices
windowrule = size 40% 20%, match:class blueman-manager

# mpv
windowrule = opaque on, match:class mpv
windowrule = fullscreen on, match:class mpv, match:initial_title (.*)(Episode)(.*)(- mpv)
windowrule = size (0.75*monitor_h*window_w/window_h) (monitor_h*0.75), match:class mpv

# scrcpy
# windowrule = float on, match:class scrcpy

windowrule = opaque on, match:class ffplay
windowrule = opaque on, match:class virt-manager, match:title (.*) on QEMU/KVM, match:initial_class virt-manager, match:initial_title (.*) on QEMU/KVM
windowrule = size (8/15)*monitor_w (8/15)*monitor_h, match:initial_class virt-manager, match:initial_title Virtual Machine Manager
windowrule = size 0.25*monitor_w 0.5*monitor_h, match:class virt-manager, match:title Virtual Machine Manager, match:initial_class virt-manager, match:initial_title Virtual Machine Manager

# waydroid
windowrule = fullscreen on, match:class Waydroid, match:title Waydroid
windowrule = fullscreen on, match:class waydroid(.*)

# V4L2 QT capture
windowrule = force_rgbx on, match:title V4L2 Capture (.*)
# windowrule = float on, match:title V4L2 Capture (.*)
windowrule = keep_aspect_ratio on, match:title V4L2 Capture (.*)
windowrule = max_size 775 680, match:title V4L2 Test Bench
# windowrule = float on, match:title V4L2 Test Bench

# chromium
windowrule = opaque on, match:class chromium
windowrule = float on, match:title (.*) - Chromium, match:initial_title (.*) - Chromium, match:class chromium, match:initial_class chromium
windowrule = size 992 620, match:initial_title Chromium

# Dev tools
# windowrule = float on, match:class chromium, match:title DevTools.*, match:initial_class chromium, match:initial_title DevTools.*
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class chromium, match:title DevTools.*, match:initial_class chromium, match:initial_title DevTools(.*)

# nwg-look
# windowrule = float on, match:title nwg-look

# auto-cpufreq
windowrule = opacity .9, match:title auto-cpufreq

# ghostty
windowrule = opacity .8, match:class com.mitchellh.ghostty

# nemo file manager
# windowrule = float on, match:class nemo
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class nemo
windowrule = opacity .8, match:class nemo

# python output popups
# windowrule = float on, match:class python3, match:title Figure (.*), match:initial_class python3, match:initial_title Figure (.*)

# chromium
# windowrule = float on, match:class chromium, match:title Save File, match:initial_class chromium, match:initial_title Save File
# windowrule = float on, match:class xdg-desktop-portal-gtk, match:title All Files, match:initial_class xdg-desktop-portal-gtk

# layer-rules
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace wofi
layerrule = dim_around on, match:namespace wofi
layerrule = ignore_alpha 0, match:namespace wofi
layerrule = blur on, match:namespace logout_dialog
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = no_anim on, match:namespace hyprpicker
layerrule = no_anim on, match:namespace selection

# windowrule = float on, match:class xdg-desktop-portal-gtk, match:title (Open File)

# mission control
windowrule = min_size 1110 590, match:class io.missioncenter.MissionCenter, match:title Mission Center

# Allow tearing for games
windowrule = fullscreen on, match:class supertuxkart
windowrule = fullscreen on, match:class xonotic-(.*)

# Hyprland GUI
# windowrule = float on, match:class hyprpolkitagent
windowrule = dim_around on, match:class hyprpolkitagent
windowrule = dim_around on, match:class hyprland-share-picker

# polychromatic mouse controls
# windowrule = float on, match:class polychromatic
windowrule = size (monitor_w/2) (monitor_h/2), match:class polychromatic

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# V4L2 capture utility
windowrule = keep_aspect_ratio on, match:class qv4l2, match:title V4L2 Capture (OpenGL), match:initial_class qv4l2, match:initial_title V4L2 Capture (OpenGL)

# V4L2 viewr
windowrule = force_rgbx on, match:class qvidcap, match:title V4L2 Viewer, match:initial_class qvidcap, match:initial_title V4L2 Viewer

# gimp
windowrule = size (monitor_w*0.5) (monitor_h*0.6), match:class gimp
windowrule = max_size 470 30, match:class gimp, match:title Layer Select, match:initial_class gimp, match:initial_title Layer Select
windowrule = size (monitor_w*0.4) (monitor_h*0.6), match:class org.pulseaudio.pavucontrol, match:title Volume Control

# Fix some dragging issues with XWayland
windowrule {
	name = fix-xwayland-drags
	match:class = ^$
	match:title = ^$
	match:xwayland = true
	match:float = true
	match:fullscreen = false
	match:pin = false
	no_focus = true
}

windowrule {
	name = Scaled_Media 
	match:class = mpv|swayimg
	tag = +scaled
}

windowrule {
	name = Fix_Scaled_$media_aspect
	match:tag = scaled
	move = cursor_x*(1-$media_aspect*(window_w/window_h)*(monitor_h/monitor_w)) (1-$media_aspect)*cursor_y+(25*(1-cursor_y/monitor_h))
}

# Launch inside the screen boundary
windowrule = move cursor_x-window_w*cursor_x/monitor_w cursor_y-window_h*cursor_y/monitor_h+25*(1-cursor_y/monitor_h), match:class .*
